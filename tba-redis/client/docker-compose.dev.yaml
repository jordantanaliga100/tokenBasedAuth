name: tba-client

services:
  # Ang Gateway
  client_proxy:
    container_name: client_proxy
    image: nginx:alpine

    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client

  # Ang Vite Dev Server
  client:
    container_name: tba-client-app
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app # Ito ang Volume: Sync ang local files sa container
      - /app/node_modules # Huwag i-sync ang node_modules (para mabilis)
    environment:
      - VITE_PORT=5173
