version: "3.8"

include:
  - ./client/docker-compose.dev.yaml
  - ./server/docker-compose.dev.yaml
services:
  # --- Main Nginx ---
  main_nginx:
    image: nginx:alpine
    container_name: main_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client_proxy
      - server_proxy
