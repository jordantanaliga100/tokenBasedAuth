version: "3.8"
services:
  # --- Frontend Nginx ---
  frontend-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html # Kung build na, kundi, gamitin ang Vite proxy for dev
    depends_on:
      - client-app
      - backend-nginx

  # --- Frontend App (Vite Dev Server) ---
  client-app:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  # --- Backend Nginx ---
  backend-nginx:
    image: nginx:alpine
    volumes:
      - ./server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server-app

  # --- Backend App (Node.js) ---
  server-app:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5050:5000"
